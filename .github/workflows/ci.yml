name: QA Tests
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - run: npm ci
      - run: npx playwright install
      
      - name: Run Playwright Tests
        run: npx playwright test --reporter=html,json
        continue-on-error: true
      
      - name: Debug - List all generated files
        if: always()
        run: |
          echo "=== Files in root directory ==="
          find . -maxdepth 1 -type f -name "*.json" -o -name "*.xml" | head -20
          echo ""
          echo "=== Files in playwright-report ==="
          ls -la playwright-report/ || echo "Not found"
          echo ""
          echo "=== Searching for report.json anywhere ==="
          find . -name "report.json" -type f 2>/dev/null | head -10
          echo ""
          echo "=== Searching for junit.xml anywhere ==="
          find . -name "junit.xml" -type f 2>/dev/null | head -10
      
      - name: Generate Test Report
        run: node scripts/generate-test-report.js
        if: always()
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      
      - name: Deploy Dashboard to GitHub Pages
        if: github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
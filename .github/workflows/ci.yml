name: QA Tests
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - run: npm ci
      - run: npx playwright install
      
      - name: Run Playwright Tests
        run: npx playwright test --reporter=html,json
        continue-on-error: true
      
      - name: Debug - Check for report.json
        if: always()
        run: |
          echo "Checking for report.json..."
          echo "Files in root:"
          ls -la *.json 2>/dev/null || echo "No JSON files in root"
          echo ""
          echo "Files in playwright-report:"
          ls -la playwright-report/ || echo "playwright-report directory not found"
          echo ""
          if [ -f "report.json" ]; then
            echo "✓ report.json found in root - moving to playwright-report/"
            mv report.json playwright-report/report.json
          fi
          if [ -f "playwright-report/report.json" ]; then
            echo "✓ report.json now in playwright-report/"
            wc -l playwright-report/report.json
          else
            echo "✗ report.json still NOT found"
          fi
      
      - name: Generate Test Report
        run: node scripts/generate-test-report.js
        if: always()
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      
      - name: Deploy Dashboard to GitHub Pages
        if: github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
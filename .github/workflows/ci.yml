name: QA Tests
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - run: npm ci
      - run: npx playwright install
      
      - name: Run Playwright Tests
        run: npx playwright test
        continue-on-error: true
      
      - name: Generate Test Report
        run: node scripts/generate-test-report.js
        if: always()
      
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      
      - name: Upload Ortoni Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ortoni-report
          path: ortoni-report/
          retention-days: 30
      
      - name: Prepare GitHub Pages Deployment
        if: github.ref == 'refs/heads/main' && always()
        run: |
          mkdir -p gh-pages
          # Copy dashboard hub
          cp -r dashboard/* gh-pages/ || true
          # Copy test reports
          cp -r playwright-report gh-pages/playwright-report 2>/dev/null || true
          cp -r ortoni-report gh-pages/ortoni-report 2>/dev/null || true
          echo "✓ Reports prepared for deployment"
      
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages